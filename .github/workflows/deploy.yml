name: Deploy to GitHub Pages

on:
  # Trigger the workflow on pushes to the `main` branch
  push:
    branches: [ main ]
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install dependencies and build your site with Astro
        uses: withastro/action@v3
        with:
          # Set the path to your project if it's not the root folder (optional)
          node-version: '20'  # You can specify your preferred Node.js version
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          folder: dist  # Make sure it matches your output folder for Astro
